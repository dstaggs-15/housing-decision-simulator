name: Run Housing Simulation

on:
  workflow_dispatch:

jobs:
  simulate:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install numpy matplotlib reportlab

      - name: Run simulation
        run: python housing_sim_v3.py

      - name: Save results to repo
        run: |
          mkdir -p results/charts
          cp outputs/housing_analysis_report.pdf results/housing_analysis_report.pdf
          cp outputs/charts/*.png results/charts/
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f results/
          git diff --staged --quiet || git commit -m "Simulation results - run #${{ github.run_number }}"
          git push
